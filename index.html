:root{--am:#FFC400;--pr:#0a0a0a;--card:#141414;--ln:#222;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--pr);color:#fff;font-family:'Trebuchet MS','Segoe UI',sans-serif;}
.wrap{max-width:640px;margin:0 auto;padding:18px 14px 60px;}
.topo{border-bottom:3px solid var(--am);padding-bottom:12px;margin-bottom:16px;}
.kicker{font-size:11px;letter-spacing:2px;color:var(--am);font-weight:700;}
.titulo{font-size:22px;font-weight:800;line-height:1.1;}
.quem{font-size:13px;color:#999;margin-top:4px;}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.pill{border:none;cursor:pointer;border-radius:999px;padding:8px 14px;font-weight:700;font-size:14px;background:#1c1c1c;color:#888;}
.pill.on{background:var(--am);color:#000;}
input[type=date]{background:#141414;border:1px solid var(--ln);color:#fff;border-radius:10px;padding:8px 10px;font-size:14px;}
.hint{font-size:11px;color:#666;margin-bottom:16px;}
.card{background:var(--card);border:1px solid var(--ln);border-radius:14px;padding:14px;margin-bottom:10px;}
.card-top{display:flex;gap:12px;align-items:flex-start;}
.nome{width:96px;flex-shrink:0;}
.nome b{font-size:15px;line-height:1.2;display:block;}
.tag{font-size:10px;background:var(--am);color:#000;padding:2px 6px;border-radius:6px;font-weight:800;}
.rmv{background:none;border:none;color:#e55;cursor:pointer;font-size:18px;line-height:1;padding:0;margin-left:6px;}
.checks{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.chk{cursor:pointer;border-radius:10px;padding:9px 4px;font-size:12px;font-weight:700;border:2px solid #2a2a2a;background:transparent;color:#777;}
.chk.on{border-color:var(--am);background:rgba(255,196,0,.15);color:var(--am);}
.just{margin-top:10px;width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;color:#ddd;font-size:13px;}
.addrow{display:flex;gap:8px;margin:6px 0 22px;}
.addrow input{flex:1;background:var(--card);border:1px solid #2a2a2a;border-radius:10px;padding:11px 12px;color:#fff;font-size:14px;}
.addbtn{background:#1c1c1c;color:var(--am);border:1px solid var(--am);border-radius:10px;padding:0 16px;font-weight:800;cursor:pointer;}
.stats{display:flex;gap:10px;margin-bottom:16px;}
.stat{flex:1;background:var(--card);border:1px solid var(--ln);border-radius:12px;padding:14px 8px;text-align:center;}
.stat .n{font-size:28px;font-weight:800;color:var(--am);}
.stat .l{font-size:11px;color:#888;}
.enviar{width:100%;background:var(--am);color:#000;border:none;border-radius:12px;padding:15px;font-weight:800;font-size:16px;cursor:pointer;}
.enviar:disabled{opacity:.5;}
.aviso{background:#2d2000;border:1px solid var(--am);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:var(--am);}
.result{margin-top:20px;background:#0d1f12;border:1px solid #1f5132;border-radius:14px;padding:16px;}
.result h4{margin:0 0 10px;font-size:12px;color:#4ade80;}
.bolha{background:#075e54;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.5;white-space:pre-line;}
.acoes{display:flex;gap:8px;margin-top:10px;}
.acoes a{flex:1;text-align:center;text-decoration:none;border-radius:10px;padding:11px;font-weight:700;font-size:14px;background:#25d366;color:#06310f;}
.ptable{width:100%;border-collapse:collapse;margin-top:8px;}
.ptable th,.ptable td{border:1px solid var(--ln);padding:8px;font-size:13px;text-align:center;}
.ptable th{background:#111;color:var(--am);}
.load{color:#888;padding:20px;text-align:center;}









/* ── RESPONSIVO PC/TABLET ── */
@media (min-width:768px){
  .wrap{max-width:900px;padding:24px 32px 60px;}
  .checks{grid-template-columns:repeat(6,1fr);}
  .stats{gap:16px;}
  .stat .n{font-size:36px;}
  .controls{gap:10px;}
  .pill{padding:9px 18px;font-size:14px;}
  .card{padding:16px 20px;}
  .titulo{font-size:26px;}
}
@media (min-width:1200px){
  .wrap{max-width:1100px;}

var GAS_URL='https://script.google.com/macros/s/AKfycbwiTKTeVmjR0WX2K7n5zqfDrWpsSp1884lNT4PJ-NRXnHKkaa0Q8tYf5NI3kKwfrRZs/exec';

function $(id){return document.getElementById(id);}
function esc(t){return String(t).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function pad(n){return n<10?'0'+n:String(n);}
function hoje(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtBR(s){if(!s)return'';var p=String(s).substring(0,10).split('-');if(p.length===3&&p[0].length===4)return p[2]+'/'+p[1]+'/'+p[0];return s;}
function erroTela(msg){$('app').innerHTML='<div style="color:#e88;padding:20px;font-size:13px;line-height:1.6">'+msg+'<br><br><a href="javascript:location.reload()" style="color:#FFC400">⟳ Recarregar</a></div>';}

function callAPI(action,params,onSuccess,onFailure){
  var body=JSON.stringify(Object.assign({action:action,token:TOKEN},params||{}));
  fetch(GAS_URL,{method:'POST',body:body})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){if(d.ok)onSuccess(d.data);else onFailure(new Error(d.error||'Erro'));})
    .catch(function(e){onFailure(e);});
}

function classeIcon(c,sz){
  sz=sz||32;
  if(LOGOS_CLASSES&&LOGOS_CLASSES[c]){
    if(c==='Pioneiro'){
      // box-shadow não clipa a imagem, garante anel visível
      return '<img src="'+LOGOS_CLASSES[c]+'" style="width:'+sz+'px;height:'+sz+'px;object-fit:contain;flex-shrink:0;border-radius:50%;box-shadow:0 0 0 2px #ccc,0 0 0 3px #555">';
    }
    return '<img src="'+LOGOS_CLASSES[c]+'" style="width:'+sz+'px;height:'+sz+'px;object-fit:contain;flex-shrink:0">';
  }
  var cor=CLASSE_COR[c]||'#888';
  return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+cor+';display:inline-flex;align-items:center;justify-content:center;font-size:'+(sz*0.5)+'px;flex-shrink:0">⭐</div>';
}

  callAPI('getEspecialidades',{},function(r){
    if(state._espReqId!==reqId||state.view!=='especialidades')return;
    state._esp=r;
    state._espOpen=state._espOpen||{};
    var classesParaAbrir=classeAlvo?[classeAlvo]:Object.keys(r.classesMembros||{});
    classesParaAbrir.forEach(function(classe){
      var found=(r.classesMembros[classe]||[]).find(function(x){return x.nome===nome&&x.unidade===unit;});

// Calcula horários e gera HTML da agenda
function calcAgendaHtml(inicio,atividades,compact){
  function toMin(t){var p=String(t||'00:00').split(':');return(parseInt(p[0])||0)*60+(parseInt(p[1])||0);}
  function toTime(m){return pad(Math.floor(m/60)%24)+':'+pad(m%60);}
  var cursor=toMin(inicio);
  var html='';
  (atividades||[]).forEach(function(a,i){
    var startTime=toTime(cursor);
    cursor+=parseInt(a.min)||0;
    var bg=i%2===0?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.07)';
    if(compact){
      html+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 6px;background:'+bg+';border-radius:4px">'
        +'<span><span style="color:#666;font-size:11px;margin-right:6px">'+startTime+'</span>'+esc(a.nome)+'</span>'
        +'<span style="color:#4ade80;font-weight:700;flex-shrink:0;margin-left:8px">'+a.min+'min</span></div>';
    } else {
      html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:'+bg+';border-radius:6px;margin-bottom:4px">'
        +'<div style="font-size:13px;font-weight:700;color:#FFC400;flex-shrink:0;width:42px">'+startTime+'</div>'
        +'<div style="flex:1;font-size:14px">'+esc(a.nome)+'</div>'
        +'<div style="font-size:13px;color:#888;flex-shrink:0">'+a.min+'min</div>'
        +'</div>';
    }
  });
  return html;
}


function eyeIcon(visible,sz){

// Mantém o scroll do menu na pill ativa
function scrollToActivePill(){
  var row=document.querySelector('.pills-row');
  if(!row)return;
  var active=row.querySelector('.pill.on');
  if(!active)return;
  // Centralizar sem animação (evita looping visual)
  var center=active.offsetLeft - row.offsetWidth/2 + active.offsetWidth/2;
  row.scrollLeft=center;
}

function startApp(){
  var CACHE_KEY='te_ctx_'+TOKEN;

  // 1. Mostrar tela imediatamente se tiver cache
  try{
    var cached=localStorage.getItem(CACHE_KEY);
    if(cached){
      var cc=JSON.parse(cached);
      if(cc&&cc.ok){
        CTX=cc; state.date=CTX.hoje||hoje();
        if(CTX.units&&CTX.units.length===1)state.unit=CTX.units[0];
        render(); // mostra imediatamente com dados em cache
      }
    }
  }catch(e){}

  // 2. Chamada única: ctx + roster + settings juntos
  callAPI('init',{date:hoje()},
    function(r){
      CTX=r.ctx; state.settings=r.settings||state.settings;
      state.date=CTX.hoje||hoje();

      if(!CTX.ok){erroTela('Link inválido ou expirado.<br>Peça um novo link ao administrador.');return;}

      // Atualizar cache
      try{localStorage.setItem(CACHE_KEY,JSON.stringify(CTX));}catch(e){}

      if(r.roster){
        // Roster já veio junto — renderizar direto sem segunda chamada
        state.rows=r.roster.rows; state.jaSalvo=!!(r.roster.jaSalvo);
        if(!state.unit&&CTX.units&&CTX.units.length===1)state.unit=CTX.units[0];
        render();
      } else {
        // Admin com múltiplas unidades: renderizar seleção de unidade
        if(!state.unit&&CTX.units&&CTX.units.length===1)state.unit=CTX.units[0];
        render();
      }
    },
    function(e){
      // Se não tem cache, mostra erro; se tem cache, já está exibindo
      if(!CTX)erroTela('Erro ao conectar: '+(e.message||e));
    }
  );
}
startApp();

function mostrarToast(msg){

      +'</div></div>';
  });

function calcTempo(r){
  function toMin(t){var p=String(t||'00:00').split(':');return(parseInt(p[0])||0)*60+(parseInt(p[1])||0);}
  var disp=Math.max(0,toMin(r.fim)-toMin(r.inicio));
  var usado=(r.atividades||[]).reduce(function(s,a){return s+(parseInt(a.min)||0);},0);
  return{disp:disp,usado:usado,rest:disp-usado};
}

function updateTimebar(){
  syncReuniaoState();
  var r=state._reuniaoAtiva;if(!r)return;
  var t=calcTempo(r);
  var pct=t.disp>0?Math.min(100,Math.round(t.usado/t.disp*100)):0;
  var cor=t.rest<0?'#e55':t.rest<15?'#FFC400':'#4ade80';
  var bar=document.getElementById('_timebar_');
  var txt=document.getElementById('_timetext_');
  if(bar){bar.style.width=pct+'%';bar.style.background=cor;}
  if(txt)txt.innerHTML='<span style="color:#aaa;font-size:12px">'+r.inicio+' → '+r.fim+'</span>'
    +'<span style="color:'+cor+';font-weight:700;font-size:13px">'
    +(t.rest>=0?t.rest+'min restantes':Math.abs(t.rest)+'min excedidos ⚠️')+'</span>';
}

function doZero(){
  if(window._novaReuniaoOv)window._novaReuniaoOv.remove();
  state._reuniaoAtiva={id:null,nome:'',tipo:'Sábado',inicio:'14:00',fim:'17:30',atividades:[],publicadaData:''};
  renderReuniaoAtiva();
}

function usarModelo(id){
  if(window._novaReuniaoOv)window._novaReuniaoOv.remove();
  var r=(state._reunioes||[]).find(function(x){return x.id===id;});
  if(!r)return;
  // Cria cópia (novo id = null)
  state._reuniaoAtiva=JSON.parse(JSON.stringify(r));
  state._reuniaoAtiva.id=null;
  state._reuniaoAtiva.nome=r.nome+' (cópia)';
  state._reuniaoAtiva.publicadaData='';
  renderReuniaoAtiva();
}

function abrirReuniao(id){
  var r=(state._reunioes||[]).find(function(x){return x.id===id;});
  if(!r)return;
  state._reuniaoAtiva=JSON.parse(JSON.stringify(r));
  renderReuniaoAtiva();
}

function deletarReuniao(id){
  if(!confirm('Excluir este modelo?'))return;
  callAPI('deleteReuniao',{rowId:id},function(){
    state._reunioes=(state._reunioes||[]).filter(function(r){return r.id!==id;});
    renderPlanejar();
  },function(e){alert('Erro: '+(e.message||e));});
}

// ── Drag & Drop de atividades (funciona em mobile e desktop) ──

var _dd = {
  dragging: null,    // índice sendo arrastado
  startY: 0,
  clone: null,       // elemento visual que segue o dedo/mouse
  placeholder: null, // espaço reservado na lista
  items: [],         // refs aos elementos da lista
  offsetY: 0
};

function initDragDrop() {
  var container = document.getElementById('_rativs_drag_');
  if (!container) return;
  _dd.items = Array.from(container.querySelectorAll('.ativ-item'));
  _dd.items.forEach(function(el, i) {
    var handle = el.querySelector('.drag-handle');
    if (!handle) return;

    // Desktop: mouse
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startDrag(i, el, e.clientY);
    });

    // Mobile: touch
    handle.addEventListener('touchstart', function(e) {
      e.preventDefault();
      startDrag(i, el, e.touches[0].clientY);
    }, {passive: false});
  });

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', function(e) {
    if (_dd.dragging === null) return;
    e.preventDefault();
    onMove({clientY: e.touches[0].clientY});
  }, {passive: false});
  document.addEventListener('touchend', endDrag);
}

function startDrag(i, el, clientY) {
  _dd.dragging = i;
  _dd.startY = clientY;

  var rect = el.getBoundingClientRect();
  _dd.offsetY = clientY - rect.top;

  // Clone visual que segue o dedo
  var clone = el.cloneNode(true);
  clone.style.cssText = 'position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;opacity:0.85;z-index:9999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.6);border-radius:10px;transition:none';
  document.body.appendChild(clone);
  _dd.clone = clone;

  // Placeholder no lugar original
  var ph = document.createElement('div');
  ph.style.cssText = 'height:'+rect.height+'px;background:#FFC40022;border:2px dashed #FFC400;border-radius:10px;margin-bottom:6px;transition:all .15s';
  el.parentNode.insertBefore(ph, el);
  el.style.display = 'none';
  _dd.placeholder = ph;
}

function onMove(e) {
  if (_dd.dragging === null || !_dd.clone) return;
  var y = e.clientY;

  // Mover o clone
  _dd.clone.style.top = (y - _dd.offsetY) + 'px';

  // Encontrar sobre qual item estamos
  var container = document.getElementById('_rativs_drag_');
  if (!container) return;
  var items = Array.from(container.querySelectorAll('.ativ-item:not([style*="display: none"])'));

  var after = null;
  items.forEach(function(item) {
    var rect = item.getBoundingClientRect();
    var mid = rect.top + rect.height / 2;
    if (y > mid) after = item;
  });

  // Mover placeholder
  if (after) {
    after.parentNode.insertBefore(_dd.placeholder, after.nextSibling);
  } else if (items.length > 0) {
    container.insertBefore(_dd.placeholder, items[0]);
  }
}

function endDrag() {
  if (_dd.dragging === null) return;

  // Remover clone
  if (_dd.clone) { _dd.clone.remove(); _dd.clone = null; }

  // Descobrir nova posição do placeholder
  var container = document.getElementById('_rativs_drag_');
  if (!container || !_dd.placeholder) { _dd.dragging = null; return; }

  var allChildren = Array.from(container.children);
  var newIdx = allChildren.indexOf(_dd.placeholder);
  var oldIdx = _dd.dragging;

  // Limpar
  _dd.placeholder.remove();
  _dd.placeholder = null;

  // Restaurar elemento oculto
  var items = container.querySelectorAll('.ativ-item');
  if (items[oldIdx]) items[oldIdx].style.display = '';

  _dd.dragging = null;

  // Se moveu, reordenar
  if (newIdx !== oldIdx && newIdx >= 0) {
    syncReuniaoState();
    var arr = state._reuniaoAtiva.atividades;
    var item = arr.splice(oldIdx, 1)[0];
    // Ajustar índice pois removemos um elemento
    var insertAt = newIdx > oldIdx ? newIdx - 1 : newIdx;
    arr.splice(insertAt, 0, item);
    renderReuniaoAtiva();
  }

  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup', endDrag);
}

  var msg='';
  msg+='╔══ *PROGRAMAÇÃO DA REUNIÃO* ══╗\n';

function toggleClasseExpand(classe){
  if(!state._espOpen)state._espOpen={};
  state._espOpen['_classe_'+classe]=!state._espOpen['_classe_'+classe];
  renderEspecialidades();
}

function toggleExpand(key){
  if(!state._espOpen)state._espOpen={};
  state._espOpen[key]=!state._espOpen[key];
  renderEspecialidades();
}

function toggleReqClasse(key,classe,idx){
  var d=state._esp;if(!d)return;
  var parts=key.split('|');
  var m=(d.classesMembros[classe]||[]).find(function(x){return x.unidade===parts[0]&&x.nome===parts[1];});
  if(!m)return;
  if(!m.requisitos[classe])m.requisitos[classe]=[];
  m.requisitos[classe][idx]=!m.requisitos[classe][idx];
  if(m.requisitos[classe][idx]){
    if(!m.datas)m.datas={};
    if(!m.datas[classe])m.datas[classe]=[];
    if(!m.datas[classe][idx])m.datas[classe][idx]=hoje();
  }
  var reqs=d.requisitos[classe]||[];
  var done=m.requisitos[classe]||[];
  m.progresso.feitos=reqs.filter(function(_,i){return done[i];}).length;
  m.progresso.pct=reqs.length>0?Math.round(m.progresso.feitos/reqs.length*100):0;
  if(!state._espEdits)state._espEdits={};
  state._espEdits[key]=m;
  renderEspecialidades();
}

function setDataReqClasse(key,classe,idx,val){
  var d=state._esp;if(!d)return;
  var parts=key.split('|');
  var m=(d.classesMembros[classe]||[]).find(function(x){return x.unidade===parts[0]&&x.nome===parts[1];});
  if(!m)return;
  if(!m.datas)m.datas={};
  if(!m.datas[classe])m.datas[classe]=[];
  m.datas[classe][idx]=val;
}

function salvarMembroInline(key){
  var d=state._esp;if(!d)return;
  var m=state._espEdits&&state._espEdits[key];
  if(!m)return;
  // Garantir que classesAtivas está no objeto enviado
  if(!m.classesAtivas||!m.classesAtivas.length){
    m.classesAtivas=[m.classeAtual].filter(Boolean);
  }
  callAPI('saveMembro',{dados:m},function(){
    if(state._espEdits)delete state._espEdits[key];
    // Toast de confirmação
    mostrarToast('✓ Requisitos salvos!');
    renderEspecialidades();
  },function(e){alert('Erro ao salvar: '+(e.message||e));});
}

function mostrarToast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#4ade80;color:#06310f;padding:10px 22px;border-radius:20px;font-weight:800;font-size:14px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){
    t.style.transition='opacity .4s';t.style.opacity='0';
    setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},400);
  },2000);
}

              +(e.descricao?'<div style="font-size:11px;color:#555;margin-top:2px">'+esc(e.descricao)+'</div>':'')
              +(ok&&podeEditar?'<input type="date" value="'+esc(e.data)+'" onchange="setEspData(\''+esc(key)+'\',\''+esc(e.nome)+'\',this.value)" style="margin-top:4px;background:#0a0a0a;border:1px solid #333;color:#4ade80;border-radius:6px;padding:4px 6px;font-size:11px;width:140px">':'')
              +(ok&&!podeEditar&&e.data?'<div style="font-size:11px;color:#4ade80;margin-top:2px">'+esc(e.data)+'</div>':'')
              +'</div></div>';
          });
          if(hasEdits&&podeEditar){
            html+='<button onclick="salvarEspMembro(\''+esc(key)+'\')" style="width:100%;background:#FFC400;color:#000;border:none;border-radius:10px;padding:10px;font-weight:800;cursor:pointer;font-size:14px;margin-top:6px">Salvar ✓</button>';
          }
          html+='</div>';
        }
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });

  $('app').innerHTML=html;
  if(typeof scrollToActivePill==='function')scrollToActivePill();
}

function toggleEspClasse(classe){
  if(!state._espTabOpen)state._espTabOpen={};
  state._espTabOpen['_c_'+classe]=!state._espTabOpen['_c_'+classe];
  renderEspecialidadesTab();
}

function toggleEspMembro(key){
  if(!state._espTabOpen)state._espTabOpen={};
  state._espTabOpen[key]=!state._espTabOpen[key];
  renderEspecialidadesTab();
}

function toggleEspItem(key,espNome){
  var d=state._espTab;if(!d)return;
  var parts=key.split('|'),u=parts[0],n=parts[1];
  var membro=null;
  Object.keys(d.classesMembros).forEach(function(cl){
    var m=(d.classesMembros[cl]||[]).find(function(x){return x.unidade===u&&x.nome===n;});
    if(m)membro=m;
  });
  if(!membro)return;
  var esp=membro.especialidades.find(function(e){return e.nome===espNome;});
  if(!esp)return;
  esp.concluida=!esp.concluida;
  if(esp.concluida&&!esp.data)esp.data=hoje();
  var obrig=membro.especialidades.filter(function(e){return!e.opcional;});
  var conc=obrig.filter(function(e){return e.concluida;});
  membro.progresso.concluidas=conc.length;
  membro.progresso.total=obrig.length;
  membro.progresso.pct=obrig.length>0?Math.round(conc.length/obrig.length*100):0;
  if(!state._espTabEdits)state._espTabEdits={};
  state._espTabEdits[key]=membro;
  renderEspecialidadesTab();
}

function setEspData(key,espNome,val){
  var d=state._espTab;if(!d)return;
  var parts=key.split('|');
  Object.keys(d.classesMembros).forEach(function(cl){
    var m=(d.classesMembros[cl]||[]).find(function(x){return x.unidade===parts[0]&&x.nome===parts[1];});
    if(m){var e=m.especialidades.find(function(e){return e.nome===espNome;});if(e)e.data=val;}
  });
}

function salvarEspMembro(key){
  var d=state._espTab;if(!d)return;
  var m=state._espTabEdits&&state._espTabEdits[key];if(!m)return;
  var dados={unidade:m.unidade,nome:m.nome,
    items:m.especialidades.map(function(e){return{espNome:e.nome,concluida:e.concluida,data:e.data||''};})}
  callAPI('saveEspecialidadeMembro',{dados:dados},function(){
    if(state._espTabEdits)delete state._espTabEdits[key];
    mostrarToast('✓ Especialidades salvas!');
    renderEspecialidadesTab();
  },function(e){alert('Erro: '+(e.message||e));});
}

// ── Modal: adicionar especialidade ────────────────────────────
function abrirModalAddEsp(){
  var classeOpts=['Amigo','Companheiro','Pesquisador','Pioneiro','Excursionista','Guia','Líder','Líder Master','Líder Master Avançado']
    .map(function(c){return'<option value="'+c+'">'+c+'</option>';}).join('');
  var unitOpts=UNITS.map(function(u){return'<option value="'+u+'">'+u+'</option>';}).join('');

  var ov=document.createElement('div');
  ov.id='_addEspOv_';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:9999;overflow-y:auto;padding:20px;box-sizing:border-box';
  ov.innerHTML='<div style="background:#141414;border:1px solid #FFC400;border-radius:14px;padding:20px;max-width:400px;margin:0 auto">'
    +'<div style="font-size:15px;font-weight:800;color:#FFC400;margin-bottom:16px">⭐ Nova Especialidade</div>'
    +'<input id="_espCat_" placeholder="Categoria (opcional — ex: Culinária, Saúde)" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;margin-bottom:10px;box-sizing:border-box">'
    +'<div style="font-size:12px;color:#aaa;margin-bottom:6px">Escopo</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:14px">'
    +'<button id="_esc1_" onclick="selEscopoEsp(\'classe\')" class="pill on" style="white-space:nowrap;font-size:13px">Por Classe</button>'
    +'<button id="_esc2_" onclick="selEscopoEsp(\'unidade\')" class="pill" style="white-space:nowrap;font-size:13px">Por Unidade</button>'
    +'<button id="_esc3_" onclick="selEscopoEsp(\'individual\')" class="pill" style="white-space:nowrap;font-size:13px">Individual</button>'
    +'</div>'
    +'<div id="_escopoDiv_" style="margin-bottom:12px">'
    +'<div style="font-size:12px;color:#aaa;margin-bottom:4px">Classe</div>'
    +'<select id="_espEscVal_" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;box-sizing:border-box">'+classeOpts+'</select>'
    +'</div>'
    +'<input id="_espNome_" placeholder="Nome da especialidade" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;margin-bottom:10px;box-sizing:border-box">'
    +'<input id="_espDesc_" placeholder="Descrição (opcional)" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;margin-bottom:12px;box-sizing:border-box">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">'
    +'<input type="checkbox" id="_espOpc_" style="width:18px;height:18px;cursor:pointer">'
    +'<label for="_espOpc_" style="font-size:14px;color:#aaa;cursor:pointer">Opcional (não entra na % de conclusão)</label>'
    +'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button onclick="document.getElementById(\'_addEspOv_\').remove()" style="flex:1;background:#1c1c1c;color:#aaa;border:1px solid #333;border-radius:10px;padding:12px;font-weight:700;cursor:pointer">Cancelar</button>'
    +'<button onclick="confirmarAddEsp()" style="flex:1;background:#FFC400;color:#000;border:none;border-radius:10px;padding:12px;font-weight:800;cursor:pointer">Adicionar ✓</button>'
    +'</div></div>';
  document.body.appendChild(ov);
  window._espCOpts=classeOpts; window._espUOpts=unitOpts;
}

function selEscopoEsp(tipo){
  ['_esc1_','_esc2_','_esc3_'].forEach(function(id,i){
    var el=document.getElementById(id);if(el)el.className='pill'+([tipo==='classe',tipo==='unidade',tipo==='individual'][i]?' on':'');
  });
  var div=document.getElementById('_escopoDiv_');if(!div)return;
  if(tipo==='classe')div.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:4px">Classe</div><select id="_espEscVal_" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;box-sizing:border-box">'+window._espCOpts+'</select>';
  else if(tipo==='unidade')div.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:4px">Unidade</div><select id="_espEscVal_" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;box-sizing:border-box">'+window._espUOpts+'</select>';
  else div.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:4px">Nome do membro</div><input id="_espEscVal_" placeholder="Nome exato do membro" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;box-sizing:border-box">';
}

function confirmarAddEsp(){
  var nome=(($('_espNome_')||{}).value||'').trim();
  if(!nome){alert('Informe o nome da especialidade.');return;}
  var escopo=(($('_espEscVal_')||{}).value||'').trim();
  if(!escopo){alert('Selecione o escopo.');return;}
  var desc=(($('_espDesc_')||{}).value||'').trim();
  var cat=(($('_espCat_')||{}).value||'').trim();
  var opcional=!!(($('_espOpc_')||{}).checked);
  var ov=document.getElementById('_addEspOv_');if(ov)ov.remove();
  callAPI('addEspecialidade',{dados:{nome:nome,escopo:escopo,categoria:cat,descricao:desc,opcional:opcional}},
    function(){mostrarToast('✓ Especialidade adicionada!');loadEspecialidadesTab();},
    function(e){alert('Erro: '+(e.message||e));}
  );
}

</script>
