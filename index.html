var _apiInFlight={}; // ações de escrita em andamento (evita duplo-clique)
var _writeActions=['saveAttendance','saveCarrossel','saveProva','deleteProva','saveReuniao','deleteReuniao','publishReuniao','saveMembro','saveEspecialidadeMembro','addEspecialidade','saveSettings'];

function callAPI(action,params,onSuccess,onFailure){
  // Bloqueia duplo-clique: se a mesma ação de escrita já está rodando, ignora
  if(_writeActions.indexOf(action)>=0){
    if(_apiInFlight[action]){return;}
    _apiInFlight[action]=true;
  }
  function done(){if(_writeActions.indexOf(action)>=0)delete _apiInFlight[action];}

  var body=JSON.stringify(Object.assign({action:action,token:TOKEN},params||{}));
  var ctrl=(typeof AbortController!=='undefined')?new AbortController():null;
  var timedOut=false;
  var timer=setTimeout(function(){
    timedOut=true;
    if(ctrl)ctrl.abort();
  },30000); // 30s

  var opts={method:'POST',body:body};
  if(ctrl)opts.signal=ctrl.signal;

  fetch(GAS_URL,opts)
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){clearTimeout(timer);done();if(d.ok)onSuccess(d.data);else onFailure(new Error(d.error||'Erro'));})
    .catch(function(e){
      clearTimeout(timer);done();
      if(timedOut)onFailure(new Error('A conexão demorou demais. Verifique sua internet e tente novamente.'));
      else onFailure(e);
    });
}

// Calcula horários e gera HTML da agenda
function calcAgendaHtml(inicio,atividades,compact){
  function toMin(t){var p=String(t||'00:00').split(':');return(parseInt(p[0])||0)*60+(parseInt(p[1])||0);}
  function toTime(m){return pad(Math.floor(m/60)%24)+':'+pad(m%60);}
  var cursor=toMin(inicio);
  var html='';
  (atividades||[]).forEach(function(a,i){
    var startTime=toTime(cursor);
    cursor+=parseInt(a.min)||0;
    var bg=i%2===0?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.07)';
    if(compact){
      html+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 6px;background:'+bg+';border-radius:4px">'
        +'<span><span style="color:#666;font-size:11px;margin-right:6px">'+startTime+'</span>'+esc(a.nome)+'</span>'
        +'<span style="color:#4ade80;font-weight:700;flex-shrink:0;margin-left:8px">'+a.min+'min</span></div>';
    } else {
      html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:'+bg+';border-radius:6px;margin-bottom:4px">'
        +'<div style="font-size:13px;font-weight:700;color:#FFC400;flex-shrink:0;width:42px">'+startTime+'</div>'
        +'<div style="flex:1;font-size:14px">'+esc(a.nome)+'</div>'
        +'<div style="font-size:13px;color:#888;flex-shrink:0">'+a.min+'min</div>'
        +'</div>';
    }
  });
  return html;
}

function toYMD(d){
  if(!d)return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d;
  var dt=new Date(d);
  if(isNaN(dt.getTime()))return '';
  var y=dt.getFullYear();
  var mo=String(dt.getMonth()+1).padStart(2,'0');
  var dy=String(dt.getDate()).padStart(2,'0');
  return y+'-'+mo+'-'+dy;
}
function startApp(){
  var CACHE_KEY='te_ctx_'+TOKEN;
  var hasCached=false;

  // 1. Mostrar imediatamente do cache se disponível
  try{
    var cached=localStorage.getItem(CACHE_KEY);
    if(cached){
      var cc=JSON.parse(cached);
      if(cc&&cc.ok){
        CTX=cc; state.date=CTX.hoje||hoje();
        if(CTX.role==='admin'){state.view='unidades';}
        else if(CTX.units&&CTX.units.length===1){state.unit=CTX.units[0];}
        render();
        hasCached=true;
      }
    }
  }catch(e){}

  // 2. Buscar dados frescos (apenas UMA chamada)
  callAPI('init',{date:hoje()},
    function(r){
      CTX=r.ctx; state.settings=r.settings||state.settings;
      state.date=CTX.hoje||hoje();
      if(!CTX.ok){erroTela('Link inválido ou expirado.<br>Peça um novo link ao administrador.');return;}
      try{localStorage.setItem(CACHE_KEY,JSON.stringify(CTX));}catch(e){}
      if(r.roster){state.rows=r.roster.rows;state.jaSalvo=!!(r.roster.jaSalvo);}
      // SÓ renderiza de novo se não tinha cache (evita duplo carregamento e navSeq conflito)
      if(!hasCached){
        if(CTX.role==='admin'){state.view='unidades';}
        else if(!state.unit&&CTX.units&&CTX.units.length===1){state.unit=CTX.units[0];}
        render();
      }
    },
    function(e){if(!CTX)erroTela('Erro ao conectar: '+(e.message||e));}
  );
}

function loadUnidades() {
  if (!CTX || CTX.role !== 'admin') { loadRoster(); return; }
  state.view = 'unidades';
  state._unidadesLoaded = true;
  state.unidadesTab = null; // sempre volta para o painel
  renderUnidades();
}

function renderUnidades() {
  var allUnits = (CTX && CTX.allUnits) ? CTX.allUnits : UNITS;
  var tab = state.unidadesTab; // null = painel, string = unidade

  var html = header();

  // Sub-abas das unidades (acima do conteúdo)
  html += '<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none" class="pills-row">';
  allUnits.forEach(function(u) {
    html += '<button class="pill'+(tab===u?' on':'')+'" onclick="trocarUnidadesTab(\''+esc(u)+'\')" style="white-space:nowrap">'+(EMOJI[u]||'🏕')+' '+esc(u)+'</button>';
  });
  html += '</div>';

  // Conteúdo: painel (overview) ou controle de uma unidade
  html += '<div id="_unidBody_"><div class="load">Carregando…</div></div>';

  $('app').innerHTML = html;
  if (typeof scrollToActivePill === 'function') scrollToActivePill();
  // Recarregar ao mudar data
  var dtEl = $('dt');
  if (dtEl) dtEl.addEventListener('change', function(e){
    state.date = e.target.value;
    if (state.unidadesTab) _carregarUnidade(state.unidadesTab);
    else _carregarPainelUnidades();
  });

  if (!tab) {
    _carregarPainelUnidades();
  } else {
    _carregarUnidade(tab);
  }
}

function trocarUnidadesTab(u) {
  state.unidadesTab = u;
  if (u) state.unit = u;
  renderUnidades();
}

      + '</div>';

    html += '<table class="ptable"><tr><th>Unidade</th><th>Pres.</th><th>Atr.</th><th>Aus.</th><th>Total</th></tr>';

      +'</div>'
      +'<div id="_rcard_"></div><div id="res"></div>';

    renderLista(); refreshStats();
    // Data editável dentro da sub-aba
    var dtU = document.getElementById('dt_unit');
    if (dtU) dtU.addEventListener('change', function(e){
      state.date = e.target.value;
      trocarUnidadesTab(unit);
    });
  }, function(e){
    var b = $('_unidBody_');
    if (b) b.innerHTML = '<div style="color:#e55;padding:20px">Erro: '+esc(e.message||e)+'</div>';

function _compartilharUnidade(){
  if(!state.unit||!state.rows)return;
  var txt=_buildMsgUnidade();
  if(navigator.share){
    navigator.share({title:'Presença '+state.unit,text:txt}).catch(function(){});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){mostrarToast('✓ Copiado!');}).catch(function(){});
  }
}

function _buildMsgUnidade(){
  var d=state.date||'';
  // Formatar data dd/mm/aa
  var parts=d.split('-');
  var dataFmt=parts.length===3?(parts[2]+'/'+parts[1]+'/'+parts[0].slice(2)):d;
  var emoji=EMOJI[state.unit]||'';
  var presentes=state.rows.filter(function(r){return r.presenca;}).length;
  var atrasos=state.rows.filter(function(r){return r.atraso;}).length;
  var ausentes=state.rows.filter(function(r){return !r.presenca&&!r.atraso;}).length;
  return dataFmt+' - *Unidade '+state.unit+'* '+emoji+'\n'
    +presentes+' presentes\n'
    +atrasos+' atrasos\n'
    +ausentes+' ausências';
}

function loadRanking() {
  var seq=++_navSeq;
  state.view = 'ranking';
  $('app').innerHTML = header() + '<div class="load">Calculando ranking…</div>';
  if(typeof scrollToActivePill==='function')scrollToActivePill();
  $('dt') && $('dt').addEventListener('change', function(e){ state.date=e.target.value; });
  var periodo = {ini: state.rankIni || '', fim: state.rankFim || state.date};
  callAPI('getRanking', {periodo: periodo}, function(r) {
    if(typeof _navSeq!=='undefined'&&_navSeq!==seq)return;
    state._ranking = r;
    renderRanking();
  }, function(e){ erroTela('Erro ranking: '+(e.message||e)); });
}

function renderRanking() {
  var r = state._ranking;
  if (!r) return;
  var html = header();
  var isAdmin=CTX&&CTX.role==='admin';

  // Botão olho (visibilidade)
  if(isAdmin){
    var rankVis=isRankingVisivel();
    html+='<div style="display:flex;justify-content:flex-end;margin-bottom:8px">'
      +'<button onclick="toggleRankingVisibilidade()" style="background:none;border:1px solid #333;border-radius:8px;color:#aaa;cursor:pointer;padding:5px 10px;font-size:12px;display:flex;align-items:center;gap:6px">'
      +eyeIcon(rankVis,14)+' '+(rankVis?'Visível para todos':'Só para admin')
      +'</button></div>';
  }
  if(!isAdmin&&!isRankingVisivel()){
    $('app').innerHTML=header()+'<div style="color:#666;text-align:center;padding:40px;font-size:14px">📊 Ranking não disponível no momento.</div>';
    return;
  }

  // Botão lançar carrossel (só admin)
  if(isAdmin){
    html+='<button onclick="abrirCarrossel()" style="width:100%;background:#1c1c1c;color:#FFC400;border:1px solid #FFC400;border-radius:12px;padding:12px;font-weight:800;cursor:pointer;font-size:14px;margin-bottom:12px">+ Lançar resultado de carrossel</button>';
  }

  // Filtro de período (compacto)
  html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:14px">'
    +'<input type="date" id="rkIni" value="'+(state.rankIni||'')+'" style="flex:1;min-width:0;background:#141414;border:1px solid #333;color:#aaa;border-radius:6px;padding:5px 4px;font-size:12px">'
    +'<span style="color:#555;flex-shrink:0">→</span>'
    +'<input type="date" id="rkFim" value="'+(state.rankFim||state.date)+'" style="flex:1;min-width:0;background:#141414;border:1px solid #333;color:#aaa;border-radius:6px;padding:5px 4px;font-size:12px">'
    +'<button onclick="filtrarRanking()" style="background:#FFC400;color:#000;border:none;border-radius:6px;padding:5px 8px;font-weight:700;cursor:pointer;font-size:12px;flex-shrink:0">OK</button>'
    +'</div>';

  // ── RANKING DE UNIDADES ──────────────────────────────────
  html+='<div style="font-size:13px;font-weight:700;color:#FFC400;letter-spacing:1px;margin-bottom:8px">🏆 RANKING DE UNIDADES</div>';
  (r.unidades||[]).forEach(function(u,i){
    var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    var bg=i===0?'rgba(255,196,0,0.12)':'#141414';
    var carr=(u.carrossel!==undefined&&u.carrossel!==null&&u.carrossel!=='') ? u.carrossel : '-';
    var tot=(u.total!==undefined&&u.total!==null) ? u.total : '-';
    html+='<div style="background:'+bg+';border:1px solid '+(i===0?'#FFC400':'#222')+';border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px">'
      +'<div style="font-size:22px;width:32px;text-align:center">'+medal+'</div>'
      +'<div style="flex:1">'
      +'<div style="font-weight:800;font-size:15px">'+(u.emoji||'')+' '+esc(u.unidade)+'</div>'
      +'<div style="font-size:11px;color:#888;margin-top:3px">Carrossel: '+carr+' pts</div>'
      +'</div>'
      +'<div style="font-size:24px;font-weight:800;color:#FFC400">'+tot+'</div>'
      +'</div>';
  });

  // ── RANKING INDIVIDUAL com dropdown ──────────────────────
  var selKey=state._rankMetrica||'presenca';
  var opcoes=[
    {key:'presenca',    label:'🏅 Mais presenças'},
    {key:'pontualidade',label:'⏰ Mais pontuais'},
    {key:'exemplar',   label:'⭐ Mais exemplares (Bíb+Cam+Cls)'},
    {key:'visitas',    label:'👥 Desbravador + visitas'}
  ];
  html+='<div style="font-size:13px;font-weight:700;color:#FFC400;letter-spacing:1px;margin-bottom:8px;margin-top:4px">👤 RANKING INDIVIDUAL</div>';
  html+='<div style="position:relative;margin-bottom:12px">'
    +'<select onchange="state._rankMetrica=this.value;renderRanking()" style="width:100%;background:#141414;border:2px solid #FFC400;color:#FFC400;border-radius:10px;padding:10px 36px 10px 12px;font-size:14px;font-weight:700;cursor:pointer;appearance:none;-webkit-appearance:none">'
    +opcoes.map(function(o){return'<option value="'+o.key+'"'+(selKey===o.key?' selected':'')+'>'+o.label+'</option>';}).join('')
    +'</select>'
    +'<div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:#FFC400;font-size:14px">▼</div>'
    +'</div>';

  // Calcular lista
  var lista=[];
  if(selKey==='visitas'){
    lista=(r.visitas||[]);
  } else if(selKey==='pontualidade'){
    lista=(r.membros||[]).slice().sort(function(a,b){return(b.pontualidade||0)-(a.pontualidade||0);}).slice(0,10);
  } else if(selKey==='exemplar'){
    lista=(r.membros||[]).slice().sort(function(a,b){
      return((b.biblia||0)+(b.camiseta||0)+(b.classe||0))-((a.biblia||0)+(a.camiseta||0)+(a.classe||0));
    }).slice(0,10);
  } else {
    lista=(r.membros||[]).slice().sort(function(a,b){return(b.presenca||0)-(a.presenca||0);}).slice(0,10);
  }

  lista.forEach(function(m,i){
    var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    var valor=selKey==='pontualidade'?(m.pontualidade||0)
      :selKey==='exemplar'?((m.biblia||0)+(m.camiseta||0)+(m.classe||0))
      :selKey==='visitas'?(m.visitas||0)
      :(m.presenca||m.total||0);
    html+='<div style="background:#141414;border:1px solid #222;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px">'
      +'<div style="width:28px;text-align:center;font-size:'+(i<3?'18':'13')+'px">'+medal+'</div>'
      +'<div style="flex:1"><div style="font-weight:700">'+esc(m.nome||m.unidade||'')+'</div>'
      +(m.unidade?'<div style="font-size:11px;color:#888">'+esc(m.unidade)+'</div>':'')+'</div>'
      +'<div style="font-size:20px;font-weight:800;color:#FFC400">'+valor+'</div>'
      +'</div>';
  });
  if(!lista.length){
    html+='<div style="color:#666;text-align:center;padding:20px">Sem dados para o período.</div>';
  }

  $('app').innerHTML = html;
  if(typeof scrollToActivePill==='function')scrollToActivePill();
  $('dt') && $('dt').addEventListener('change', function(e){ state.date=e.target.value; });
}

var EMOJI = {'Leão':'🦁','Panda':'🐼','Tigre':'🐯','Puma':'🐆'};

function confirmarCarrossel() {
  var dataVal = ($('_cDate_')||{}).value || state.date;
  var tipo    = ($('_cTipo_')||{}).value || 'Carrossel';
  var resultados = UNITS.map(function(u){
    return {unidade:u, pontos:parseInt(($('_cp_'+u+'_')||{}).value)||0, obs:''};
  }).filter(function(r){return r.pontos>0;});
  if(!resultados.length){alert('Informe ao menos um ponto para uma unidade.');return;}

  // Fechar modal
  var ov=document.getElementById('_carrosselOv_');
  if(ov)ov.remove();

  callAPI('saveCarrossel',{data:dataVal,tipo:tipo,resultados:resultados},
    function(r){
      mostrarToast('✓ '+r.linhas+' resultado'+(r.linhas!==1?'s':'')+' lançado'+(r.linhas!==1?'s':'')+'!');
      loadRanking();
    },
    function(e){alert('Erro: '+(e.message||e));}
  );
}

function syncReuniaoState(){
  var r=state._reuniaoAtiva;if(!r)return;
  if($('_rnome_'))r.nome=$('_rnome_').value||r.nome;
  if($('_rtipo_'))r.tipo=$('_rtipo_').value||r.tipo;
  if($('_rini_'))r.inicio=$('_rini_').value||r.inicio;
  if($('_rfim_'))r.fim=$('_rfim_').value||r.fim;
  (r.atividades||[]).forEach(function(a,i){
    if($('_anome_'+i))a.nome=$('_anome_'+i).value;
    if($('_amin_'+i))a.min=parseInt($('_amin_'+i).value)||0;
    if($('_adesc_'+i))a.descricao=$('_adesc_'+i).value;
  });
}

function calcTempo(r){
  function toMin(t){var p=String(t||'00:00').split(':');return(parseInt(p[0])||0)*60+(parseInt(p[1])||0);}
  var disp=Math.max(0,toMin(r.fim)-toMin(r.inicio));
  var usado=(r.atividades||[]).reduce(function(s,a){return s+(parseInt(a.min)||0);},0);
  return{disp:disp,usado:usado,rest:disp-usado};
}

function updateTimebar(){
  syncReuniaoState();
  var r=state._reuniaoAtiva;if(!r)return;
  var t=calcTempo(r);
  var pct=t.disp>0?Math.min(100,Math.round(t.usado/t.disp*100)):0;
  var cor=t.rest<0?'#e55':t.rest<15?'#FFC400':'#4ade80';
  var bar=document.getElementById('_timebar_');
  var txt=document.getElementById('_timetext_');
  if(bar){bar.style.width=pct+'%';bar.style.background=cor;}
  if(txt)txt.innerHTML='<span style="color:#aaa;font-size:12px">'+r.inicio+' → '+r.fim+'</span>'
    +'<span style="color:'+cor+';font-weight:700;font-size:13px">'
    +(t.rest>=0?t.rest+'min restantes':Math.abs(t.rest)+'min excedidos ⚠️')+'</span>';
}

// ── ABA PLANEJAR ──────────────────────────────────────────────
function loadPlanejar(){
  var seq=++_navSeq;
  callAPI('getReunioes',{},function(r){
    if(_navSeq!==seq)return;
    state._reunioes=r.reunioes;
    if(state._reuniaoAtiva)renderReuniaoAtiva();
    else renderPlanejar();
  },function(e){
    if(_navSeq!==seq)return;
    var b=document.getElementById('reuniaoBody');
    if(b)b.innerHTML='<div style="color:#e88;padding:16px">Erro: '+(e.message||e)+'</div>';
  });
}

function renderPlanejar(){
  var rs=state._reunioes||[];
  var body=document.getElementById('reuniaoBody');if(!body)return;
  var html='<button onclick="novaReuniaoModal()" style="width:100%;background:#FFC400;color:#000;border:none;border-radius:12px;padding:13px;font-weight:800;cursor:pointer;font-size:15px;margin-bottom:14px">+ Nova Reunião</button>';
  if(!rs.length){
    html+='<div style="color:#666;text-align:center;padding:20px">Nenhuma reunião salva ainda.</div>';
  } else {
    html+='<div style="font-size:12px;color:#aaa;margin-bottom:8px">Modelos salvos:</div>';
    rs.forEach(function(r){
      var totalMin=(r.atividades||[]).reduce(function(s,a){return s+(a.min||0);},0);
      var pubTag=r.publicada?'<span style="color:#4ade80;font-size:11px">🟢 '+r.publicadaFmt+'</span>':'<span style="color:#666;font-size:11px">Não publicada</span>';
      html+='<div style="background:#141414;border:1px solid #222;border-radius:12px;padding:12px 14px;margin-bottom:8px">'
        +'<div style="display:flex;align-items:flex-start;gap:8px">'
        +'<div style="flex:1;cursor:pointer;min-width:0" onclick="abrirReuniao('+r.id+')">'
        +'<div style="font-weight:700;font-size:15px">'+esc(r.nome)+'</div>'
        +'<div style="font-size:12px;color:#888;margin-top:2px">'+esc(r.tipo)+' · '+r.inicio+' → '+r.fim+' · '+totalMin+'min</div>'
        +'<div style="margin-top:4px">'+pubTag+'</div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:2px;flex-shrink:0">'
        +'<button onclick="abrirReuniao('+r.id+')" style="background:none;border:none;color:#FFC400;cursor:pointer;font-size:16px;padding:6px" title="Editar">✏️</button>'
        +'<button onclick="duplicarReuniao('+r.id+')" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:16px;padding:6px" title="Duplicar">⧉</button>'
        +'<button onclick="event.stopPropagation();deletarReuniao('+r.id+')" style="background:none;border:none;color:#e55;cursor:pointer;font-size:16px;padding:6px;font-weight:300" title="Excluir">✕</button>'
        +'</div>'   // fecha div botões
        +'</div>'   // fecha div flex-row
        +'</div>';  // fecha card
    });
  }
  body.innerHTML=html;
  setTimeout(initDragDrop,50);
  // Auto-resize nas textareas de descrição
  setTimeout(function(){
    document.querySelectorAll('textarea[id^="_adesc_"]').forEach(function(t){
      // Restaurar altura da textarea (preserva conteúdo multilinha)
      t.style.height='auto';
      t.style.height=(t.scrollHeight)+'px';
    });
  },60);
}

// Modal: Nova reunião do zero ou a partir de modelo
function novaReuniaoModal(){
  var rs=state._reunioes||[];
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:9999;overflow-y:auto;padding:20px;box-sizing:border-box';
  var opts=rs.length?rs.map(function(r){
    var totalMin=(r.atividades||[]).reduce(function(s,a){return s+(a.min||0);},0);
    return '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer" onclick="usarModelo('+r.id+')">'
      +'<div style="font-weight:700">'+esc(r.nome)+'</div>'
      +'<div style="font-size:12px;color:#888;margin-top:2px">'+esc(r.tipo)+' · '+r.inicio+' → '+r.fim+' · '+totalMin+'min</div></div>';
  }).join(''):'<div style="color:#666;font-size:13px;padding:8px 0">Nenhum modelo salvo ainda.</div>';
  ov.innerHTML='<div style="background:#141414;border:1px solid #FFC400;border-radius:14px;padding:20px;max-width:400px;margin:0 auto">'
    +'<div style="font-size:15px;font-weight:800;color:#FFC400;margin-bottom:16px">+ Nova Reunião</div>'
    +'<button onclick="doZero()" style="width:100%;background:#FFC400;color:#000;border:none;border-radius:10px;padding:13px;font-weight:800;cursor:pointer;font-size:15px;margin-bottom:14px">✍️ Criar do zero</button>'
    +(rs.length?'<div style="font-size:12px;color:#aaa;margin-bottom:8px">Ou usar um modelo existente:</div>'+opts:'')
    +'<button onclick="this.parentNode.parentNode.remove()" style="width:100%;background:#1c1c1c;color:#aaa;border:1px solid #333;border-radius:10px;padding:11px;font-weight:700;cursor:pointer;margin-top:8px">Cancelar</button>'
    +'</div>';
  document.body.appendChild(ov);
  window._novaReuniaoOv=ov;
}

function doZero(){
  if(window._novaReuniaoOv)window._novaReuniaoOv.remove();
  (function(){
  var hoje=new Date().getDay(); // 0=Dom,1-5=Seg-Sex,6=Sáb
  var tipo=hoje===0?'Domingo':hoje===6?'Sábado':'Segunda';
  var ini=hoje===0?'09:00':hoje===6?'15:00':'19:00';
  var fim=hoje===0?'12:00':hoje===6?'17:00':'21:00';
  state._reuniaoAtiva={id:null,nome:'',tipo:tipo,inicio:ini,fim:fim,atividades:[],publicadaData:''};
})();
  renderReuniaoAtiva();
}

function usarModelo(id){
  if(window._novaReuniaoOv)window._novaReuniaoOv.remove();
  var r=(state._reunioes||[]).find(function(x){return String(x.id)===String(id);});
  if(!r)return;
  // Cria cópia (novo id = null)
  state._reuniaoAtiva=JSON.parse(JSON.stringify(r));
  state._reuniaoAtiva.id=null;
  state._reuniaoAtiva.nome=r.nome+' (cópia)';
  state._reuniaoAtiva.publicadaData='';
  renderReuniaoAtiva();
}

function abrirReuniao(id){
  var rs=state._reunioes||[];
  var r=null;
  for(var i=0;i<rs.length;i++){if(rs[i].id==id){r=rs[i];break;}}
  if(!r)return;
  state._reuniaoAtiva=JSON.parse(JSON.stringify(r));
  // Garantir que estamos na sub-aba planejar
  state.reuniaoTab='planejar';
  var body=document.getElementById('reuniaoBody');
  if(!body){renderReuniaoShell();return;}
  renderReuniaoAtiva();
}

function deletarReuniao(id){
  if(!confirm('Tem certeza que quer excluir este modelo de reunião? Essa ação não pode ser desfeita.'))return;
  callAPI('deleteReuniao',{rowId:id},function(){
    state._reunioes=(state._reunioes||[]).filter(function(r){return String(r.id)!==String(id);});
    renderPlanejar();
  },function(e){alert('Erro: '+(e.message||e));});
}

function publicarModal(id){
  var r=(state._reunioes||[]).find(function(x){return String(x.id)===String(id);});
  if(!r)return;
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';
  ov.innerHTML='<div style="background:#141414;border:1px solid #4ade80;border-radius:14px;padding:24px;width:100%;max-width:360px">'
    +'<div style="font-size:15px;font-weight:800;color:#4ade80;margin-bottom:12px">📢 Publicar "'+esc(r.nome)+'"</div>'
    +'<div style="font-size:13px;color:#aaa;margin-bottom:12px">Data da reunião (formato dd/MM/aaaa ou selecione):</div>'
    +'<input id="_pubDate_" type="date" value="'+hoje()+'" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:10px;font-size:15px;box-sizing:border-box;margin-bottom:16px">'
    +'<div style="display:flex;gap:8px">'
    +'<button onclick="this.parentNode.parentNode.parentNode.remove()" style="flex:1;background:#1c1c1c;color:#aaa;border:1px solid #333;border-radius:10px;padding:12px;font-weight:700;cursor:pointer">Cancelar</button>'
    +'<button onclick="confirmarPublicacao('+id+',this)" style="flex:1;background:#4ade80;color:#000;border:none;border-radius:10px;padding:12px;font-weight:800;cursor:pointer">Publicar ✓</button>'
    +'</div></div>';
  document.body.appendChild(ov);
}

function confirmarPublicacao(id,btn){
  var dateEl=document.getElementById('_pubDate_');
  var data=dateEl?dateEl.value:hoje();
  btn.parentNode.parentNode.parentNode.remove();
  callAPI('publishReuniao',{reuniaoId:id,dataPublicacao:data},function(r){
    if(r.conflito){
      _modalConflito(id,data,r.nomeExistente);
      return;
    }
    _finalizarPublicacao(id,data);
  },function(e){alert('Erro: '+(e.message||e));});
}

function _modalConflito(id,data,nomeExistente){
  var p=data.split('-');
  var dataFmt=p[2]+'/'+p[1]+'/'+p[0];
  var ov=document.createElement('div');
  ov.id='_conflitoOv_';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  var card=document.createElement('div');
  card.style.cssText='background:#141414;border:1px solid #333;border-radius:16px;padding:24px;max-width:360px;width:100%';
  card.innerHTML='<div style="font-size:16px;font-weight:700;margin-bottom:8px">⚠️ Conflito de data</div>'
    +'<div style="font-size:14px;color:#aaa;margin-bottom:20px">Já existe a reunião <strong style="color:#fff">'+esc(nomeExistente)+'</strong> publicada em '+dataFmt+'. O que deseja fazer?</div>'
    +'<div id="_conflitoBtns_" style="display:flex;flex-direction:column;gap:10px"></div>';
  var btns=card.querySelector('#_conflitoBtns_');
  var bSub=document.createElement('button');
  bSub.textContent='Substituir a reunião existente';
  bSub.style.cssText='background:#e55;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer';
  bSub.onclick=function(){_resolverConflito(id,data,'substituir');};
  var bAcr=document.createElement('button');
  bAcr.textContent='Acrescentar (duas reuniões no dia)';
  bAcr.style.cssText='background:#FFC400;color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer';
  bAcr.onclick=function(){_resolverConflito(id,data,'acrescentar');};
  var bCan=document.createElement('button');
  bCan.textContent='Cancelar';
  bCan.style.cssText='background:none;border:1px solid #333;color:#888;border-radius:10px;padding:13px;font-size:14px;cursor:pointer';
  bCan.onclick=function(){var o=document.getElementById('_conflitoOv_');if(o)o.remove();};
  btns.appendChild(bSub);btns.appendChild(bAcr);btns.appendChild(bCan);
  ov.appendChild(card);
  document.body.appendChild(ov);
}

function _resolverConflito(id,data,modo){
  var ov=document.getElementById('_conflitoOv_');if(ov)ov.remove();
  callAPI('publishReuniao',{reuniaoId:id,dataPublicacao:data,modo:modo},function(){
    _finalizarPublicacao(id,data);
  },function(e){alert('Erro: '+(e.message||e));});
}

function _finalizarPublicacao(id,data){
  var r=(state._reunioes||[]).find(function(x){return String(x.id)===String(id);});
  if(r){r.publicadaData=data;r.publicada=true;
    var p=data.split('-');r.publicadaFmt=p[2]+'/'+p[1]+'/'+p[0];}
  renderPlanejar();
  mostrarToast('Reunião publicada ✓');
}

function publicarDireto(){
  syncReuniaoState();
  var r=state._reuniaoAtiva;if(!r)return;
  // Primeiro salva, depois abre modal de publicação
  if(!r.nome.trim()){alert('Dê um nome antes de publicar.');return;}
  salvarReuniao(function(savedId){
    if(savedId)publicarModal(savedId);
  });
}

function moverAtiv(i, dir) {
  if(!state._reuniaoAtiva||!state._reuniaoAtiva.atividades)return;
  syncReuniaoState();
  var arr = state._reuniaoAtiva.atividades;
  var j = i + dir;
  if (j < 0 || j >= arr.length) return;
  var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  renderReuniaoAtiva();
}

function initDragDrop() {
  var container = document.getElementById('_rativs_drag_');
  if (!container || !window.Sortable) return;
  if (container._sortableInst) {
    try { container._sortableInst.destroy(); } catch(e) {}
    container._sortableInst = null;
  }
  container._sortableInst = new window.Sortable(container, {
    animation: 150,
    handle: '.drag-handle',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd: function(evt) {
      var from = evt.oldDraggableIndex != null ? evt.oldDraggableIndex : evt.oldIndex;
      var to   = evt.newDraggableIndex != null ? evt.newDraggableIndex : evt.newIndex;
      if (from === to) return;
      syncReuniaoState();
      var arr = state._reuniaoAtiva && state._reuniaoAtiva.atividades;
      if (!arr) return;
      var item = arr.splice(from, 1)[0];
      arr.splice(to, 0, item);
      setTimeout(renderReuniaoAtiva, 50);
    }
  });
}

function duplicarReuniao(id){
  var rs=state._reunioes||[];
  var r=null;
  for(var i=0;i<rs.length;i++){if(rs[i].id==id){r=rs[i];break;}}
  if(!r)return;
  var copia=JSON.parse(JSON.stringify(r));
  copia.id=null;
  copia.nome=r.nome+' (cópia)';
  copia.publicadaData='';
  state._reuniaoAtiva=copia;
  state.reuniaoTab='planejar';
  var body=document.getElementById('reuniaoBody');
  if(!body){renderReuniaoShell();return;}
  renderReuniaoAtiva();
}

  html+=lbl('Pontuação')+ta('_pPont_',prova?prova.pontuacao:'','Ex: 1º lugar: 50pts, 2º: 30pts','window._provaFormData.pontuacao=this.value');

function salvarProva(id){
  var fd=window._provaFormData||{};
  var catEl=$('_pCat_'), nomeEl=$('_pNome_'), tempoEl=$('_pTempo_');
  var categoria = catEl  ? String(catEl.value ||'').trim() : '';
  var nome      = nomeEl ? String(nomeEl.value||'').trim() : '';
  var tempo     = tempoEl? (parseInt(tempoEl.value)||15)   : 15;
  // Usar _provaFormData primeiro, fallback para DOM
  var qtd       = String(fd.qtdParticipantes!=null?fd.qtdParticipantes:($('_pQtd_')?$('_pQtd_').value:'')).trim();
  var pontuacao = String(fd.pontuacao!=null?fd.pontuacao:($('_pPont_')?$('_pPont_').value:'')).trim();
  var materiais = String(fd.materiais!=null?fd.materiais:($('_pMat_')?$('_pMat_').value:'')).trim();
  var descricao = window._quillDescEditor?window._quillDescEditor.root.innerHTML:'';
  if(descricao==='<p><br></p>')descricao='';
  if(!nome){alert('Informe o nome da prova.');return;}
  var prova={id:id,categoria:categoria,nome:nome,qtdParticipantes:qtd,
    tempoMin:tempo,pontuacao:pontuacao,descricao:descricao,materiais:materiais};
  var ov=document.getElementById('_provaOv_');if(ov)ov.remove();
  callAPI('saveProva',{prova:prova},function(){
    mostrarToast('✓ Prova salva!');loadProvas();
  },function(e){alert('Erro: '+(e.message||e));});
}

function calcAgendaHtml(inicio, atividades, soEscrita){

  function toTime(m){var h=Math.floor(m/60)%24,mm=m%60;return(h<10?'0':'')+h+'h'+(mm<10?'0':'')+mm;}
  var cursor=toMin(inicio);

      +(descHtml?'<div style="font-size:12px;color:#aaa;margin-top:3px;line-height:1.5">'+descHtml+'</div>':'')
      +'</div></div>';

function toggleReqClasse(key,classe,idx){
  var d=state._esp;if(!d)return;
  var parts=key.split('|');
  var m=(d.classesMembros[classe]||[]).find(function(x){return x.unidade===parts[0]&&x.nome===parts[1];});
  if(!m)return;
  if(!m.requisitos[classe])m.requisitos[classe]=[];
  m.requisitos[classe][idx]=!m.requisitos[classe][idx];
  if(m.requisitos[classe][idx]){
    if(!m.datas)m.datas={};
    if(!m.datas[classe])m.datas[classe]=[];
    if(!m.datas[classe][idx])m.datas[classe][idx]=hoje();
  }
  var reqs=d.requisitos[classe]||[];
  var done=m.requisitos[classe]||[];
  m.progresso.feitos=reqs.filter(function(_,i){return done[i];}).length;
  m.progresso.pct=reqs.length>0?Math.round(m.progresso.feitos/reqs.length*100):0;
  if(!state._espEdits)state._espEdits={};
  state._espEdits[key]=m;
  renderEspecialidades();
}

function setDataReqClasse(key,classe,idx,val){
  var d=state._esp;if(!d)return;
  var parts=key.split('|');
  var m=(d.classesMembros[classe]||[]).find(function(x){return x.unidade===parts[0]&&x.nome===parts[1];});
  if(!m)return;
  if(!m.datas)m.datas={};
  if(!m.datas[classe])m.datas[classe]=[];
  m.datas[classe][idx]=val;
}

function salvarMembroInline(key){
  var d=state._esp;if(!d)return;
  var m=state._espEdits&&state._espEdits[key];
  if(!m)return;
  // Garantir que classesAtivas está no objeto enviado
  if(!m.classesAtivas||!m.classesAtivas.length){
    m.classesAtivas=[m.classeAtual].filter(Boolean);
  }
  callAPI('saveMembro',{dados:m},function(){
    if(state._espEdits)delete state._espEdits[key];
    // Toast de confirmação
    mostrarToast('✓ Requisitos salvos!');
    renderEspecialidades();
  },function(e){alert('Erro ao salvar: '+(e.message||e));});
}

// ══ ESPECIALIDADES (aba nova) ══════════════════════════════════

function loadEspecialidadesTab(){
  var seq=++_navSeq;
  state.view='esp_tab';
  var reqId=Date.now(); state._espTabReqId=reqId;
  $('app').innerHTML=header()+'<div class="load">Carregando especialidades…</div>';
  if(typeof scrollToActivePill==='function')scrollToActivePill();
  callAPI('getEspecialidadesApp',{},function(r){
    if(state._espTabReqId!==reqId||state.view!=='esp_tab')return;
    if(typeof _navSeq!=='undefined'&&_navSeq!==seq)return;
    state._espTab=r;
    if(!state._espTabOpen)state._espTabOpen={};
    if(!state._espTabEdits)state._espTabEdits={};
    renderEspecialidadesTab();
  },function(e){if(state.view==='esp_tab')erroTela('Erro: '+(e.message||e));});
}

function renderEspecialidadesTab(){
  var d=state._espTab;if(!d)return;
  var isAdmin=CTX&&CTX.role==='admin';
  var instructorClasses=CTX&&CTX.classes;
  var cm=d.classesMembros||{};
  var html=header();

  // Título + botão adicionar
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<div style="font-size:14px;font-weight:800;color:#FFC400;letter-spacing:1px">⭐ ESPECIALIDADES</div>'
    +((isAdmin||instructorClasses)?'<button onclick="abrirModalAddEsp()" style="background:#FFC400;color:#000;border:none;border-radius:10px;padding:8px 14px;font-weight:800;cursor:pointer;font-size:13px">+ Especialidade</button>':'')
    +'</div>';

  var ordemCls=['Amigo','Companheiro','Pesquisador','Pioneiro','Excursionista','Guia','Líder','Líder Master','Líder Master Avançado'];
  var rawCls=Object.keys(cm);
  var classes=ordemCls.filter(function(c){return rawCls.indexOf(c)>=0;});
  rawCls.forEach(function(c){if(classes.indexOf(c)<0)classes.push(c);});
  if(!classes.length){
    html+='<div style="color:#666;text-align:center;padding:30px;line-height:1.8">Nenhuma especialidade cadastrada ainda.<br>'
      +'<span style="font-size:12px">Preencha a aba <b>Especialidades</b> na planilha<br>ou use o botão + acima.</span></div>';
    $('app').innerHTML=html;
    if(typeof scrollToActivePill==='function')scrollToActivePill();
    return;
  }

  classes.forEach(function(classe){
    var membros=cm[classe]||[];
    var cor=CLASSE_COR[classe]||'#FFC400';
    var isClasseOpen=!!(state._espTabOpen&&state._espTabOpen['_c_'+classe]);

    html+='<div style="margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid '+(cor+'55')+'">'
      +'<div onclick="toggleEspClasse(\''+esc(classe)+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:'+cor+'22">'
      +'<span>'+classeIcon(classe,32)+'</span>'
      +'<div style="flex:1">'
      +'<div style="font-size:15px;font-weight:800;color:'+cor+'">'+esc(classe)+'</div>'
      +'<div style="font-size:12px;color:#aaa">'+membros.length+' membro'+(membros.length!==1?'s':'')+'</div>'
      +'</div>'
      +'<div style="font-size:20px;color:'+cor+';transform:'+(isClasseOpen?'rotate(180deg)':'rotate(0)')+';transition:.2s">▼</div>'
      +'</div>';

    if(isClasseOpen){
      html+='<div style="background:#0d0d0d">';
      membros.forEach(function(m){
        var key=m.unidade+'|'+m.nome;
        var isOpen=!!(state._espTabOpen&&state._espTabOpen[key]);
        var hasEdits=!!(state._espTabEdits&&state._espTabEdits[key]);
        var pct=m.progresso.pct;
        var barCor=pct>=100?'#4ade80':cor;
        var podeEditar=isAdmin||(instructorClasses&&instructorClasses.indexOf(classe)>=0);

        html+='<div style="border-top:1px solid #1a1a1a">'
          +'<div onclick="toggleEspMembro(\''+esc(key)+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer">'
          +'<div style="flex:1">'
          +'<span style="font-weight:700;font-size:14px">'+esc(m.nome)+'</span>'
          +'<span style="font-size:11px;color:#666;margin-left:8px">'+esc(m.unidade)+'</span>'
          +'</div>'
          +'<div style="text-align:right;margin-right:8px">'
          +'<div style="font-size:13px;font-weight:800;color:'+barCor+'">'+pct+'%</div>'
          +'<div style="font-size:10px;color:#555">'+m.progresso.concluidas+'/'+m.progresso.total+' obrig.</div>'
          +'</div>'
          +'<div style="font-size:16px;color:#555;transform:'+(isOpen?'rotate(180deg)':'rotate(0)')+';transition:.2s">▼</div>'
          +'</div>'
          +'<div style="height:3px;background:#1a1a1a;margin:0 14px '+(isOpen?'0':'6')+'px">'
          +'<div style="height:100%;background:'+barCor+';width:'+pct+'%"></div>'
          +'</div>';

        if(isOpen){
          html+='<div style="padding:10px 14px 14px;background:#0a0a0a">';
          m.especialidades.forEach(function(e){
            var ok=e.concluida;
            html+='<div style="display:flex;align-items:flex-start;gap:8px;padding:8px;border-radius:8px;margin-bottom:4px;background:'+(ok?'#0a1f0f':'#111')+'">'
              +(podeEditar
                ?'<button onclick="toggleEspItem(\''+esc(key)+'\',\''+esc(e.nome)+'\')" style="flex-shrink:0;width:22px;height:22px;border-radius:5px;border:2px solid '+(ok?'#4ade80':'#333')+';background:'+(ok?'#4ade80':'transparent')+';color:#000;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-weight:900">'+(ok?'✓':'')+'</button>'
                :'<div style="flex-shrink:0;width:22px;height:22px;border-radius:5px;border:2px solid '+(ok?'#4ade80':'#222')+';background:'+(ok?'#4ade80':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:12px;color:#000;font-weight:900">'+(ok?'✓':'')+'</div>')
              +'<div style="flex:1">'
              +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;justify-content:space-between">'
              +'<div style="font-size:13px;color:'+(ok?'#4ade80':'#ccc')+';'+(ok?'text-decoration:line-through;opacity:.7':'')+';flex:1;min-width:0">' +esc(e.nome)+'</div>'
              +(podeEditar?'<button onclick="deleteEspItem(\''+esc(key)+'\',\''+esc(e.nome)+'\')" style="flex-shrink:0;background:none;border:none;color:#e55;font-size:14px;cursor:pointer;padding:0 2px" title="Excluir">✕</button>':'')
              +'</div>'
              +(e.categoria?'<div style="font-size:10px;color:#FFC400;background:#FFC40015;border-radius:4px;padding:1px 6px;display:inline-block;margin-top:2px">'+esc(e.categoria)+'</div>':'')
              +(ok&&podeEditar?'<div style="margin-top:4px"><input type="date" value="'+(toYMD(e.data)||hoje())+'" onchange="setEspData(\''+esc(key)+'\',\''+esc(e.nome)+'\',this.value)" style="background:#0a0a0a;border:1px solid #333;color:#4ade80;border-radius:6px;padding:3px 6px;font-size:11px;width:200px;zoom:0.75"></div>':'')
              +(ok&&!podeEditar&&e.data?'<div style="font-size:11px;color:#4ade80;margin-top:4px">'+esc(e.data)+'</div>':'')
              +'</div></div>';
          });
          if(hasEdits&&podeEditar){
            html+='<button onclick="salvarEspMembro(\''+esc(key)+'\')" style="width:100%;background:#FFC400;color:#000;border:none;border-radius:10px;padding:10px;font-weight:800;cursor:pointer;font-size:14px;margin-top:6px">Salvar ✓</button>';
          }
          html+='</div>';
        }
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });

  $('app').innerHTML=html;
  if(typeof scrollToActivePill==='function')scrollToActivePill();
}

function toggleEspClasse(classe){
  if(!state._espTabOpen)state._espTabOpen={};
  state._espTabOpen['_c_'+classe]=!state._espTabOpen['_c_'+classe];
  renderEspecialidadesTab();
}

function toggleEspMembro(key){
  if(!state._espTabOpen)state._espTabOpen={};
  state._espTabOpen[key]=!state._espTabOpen[key];
  renderEspecialidadesTab();
}

function toggleEspItem(key,espNome){
  var d=state._espTab;if(!d)return;
  var parts=key.split('|'),u=parts[0],n=parts[1];
  var membro=null;
  Object.keys(d.classesMembros).forEach(function(cl){
    var m=(d.classesMembros[cl]||[]).find(function(x){return x.unidade===u&&x.nome===n;});
    if(m)membro=m;
  });
  if(!membro)return;
  var esp=membro.especialidades.find(function(e){return e.nome===espNome;});
  if(!esp)return;
  esp.concluida=!esp.concluida;
  if(esp.concluida&&!esp.data)esp.data=hoje();
  var obrig=membro.especialidades.filter(function(e){return!e.opcional;});
  var conc=obrig.filter(function(e){return e.concluida;});
  membro.progresso.concluidas=conc.length;
  membro.progresso.total=obrig.length;
  membro.progresso.pct=obrig.length>0?Math.round(conc.length/obrig.length*100):0;
  if(!state._espTabEdits)state._espTabEdits={};
  state._espTabEdits[key]=membro;
  renderEspecialidadesTab();
}

function setEspData(key,espNome,val){
  var d=state._espTab;if(!d)return;
  var parts=key.split('|');
  Object.keys(d.classesMembros).forEach(function(cl){
    var m=(d.classesMembros[cl]||[]).find(function(x){return x.unidade===parts[0]&&x.nome===parts[1];});
    if(m){var e=m.especialidades.find(function(e){return e.nome===espNome;});if(e)e.data=val;}
  });
}

function salvarEspMembro(key){
  var d=state._espTab;if(!d)return;
  var m=state._espTabEdits&&state._espTabEdits[key];if(!m)return;
  var dados={unidade:m.unidade,nome:m.nome,
    items:m.especialidades.map(function(e){return{espNome:e.nome,concluida:e.concluida,data:e.data||''};})}
  callAPI('saveEspecialidadeMembro',{dados:dados},function(){
    if(state._espTabEdits)delete state._espTabEdits[key];
    mostrarToast('✓ Especialidades salvas!');
    renderEspecialidadesTab();
  },function(e){alert('Erro: '+(e.message||e));});
}

// ── Modal: adicionar especialidade ────────────────────────────
function abrirModalAddEsp(){
  // Catálogo hardcodado — sem API, sem bug
  var catalogo = CATALOGO_ESPECIALIDADES;
  var cats = Object.keys(catalogo).sort();
  _abrirModalEspComCatalogo(catalogo, cats);
}

function _abrirModalEspComCatalogo(catalogo,cats){
  window._espCatalogo=catalogo;
  // Montar opções de classe em ordem canônica
  var ordemClasses=['Amigo','Companheiro','Pesquisador','Pioneiro','Excursionista','Guia','Líder','Líder Master','Líder Master Avançado'];
  var d=state._espTab||{};
  var cm=d.classesMembros||{};
  var classesDisp=ordemClasses.filter(function(c){return cm[c];});
  if(!classesDisp.length)classesDisp=Object.keys(cm);
  window._espCOpts=classesDisp.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('');
  // Montar opções de unidade
  var unidades=['Leão','Panda','Tigre','Puma'];
  window._espUOpts=unidades.map(function(u){return '<option value="'+u+'">'+u+'</option>';}).join('');


  var ov=document.createElement('div');
  ov.id='_addEspOv_';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:9999;overflow-y:auto;padding:20px;box-sizing:border-box';

  var catSel='<select id="_espCatSel_" style="width:100%;background:#0a0a0a;border:1px solid #FFC400;color:#fff;border-radius:8px;padding:12px;font-size:16px;margin-bottom:10px;box-sizing:border-box;-webkit-appearance:auto">'
    +'<option value="">Selecione a categoria...</option>'
    +cats.map(function(c){return'<option value="'+esc(c)+'">'+esc(c)+'</option>';}).join('')
    +'</select>';

  var nomeSel='<select id="_espNome_" onclick="if(this.options.length<=1)filtrarEspecialidadesCatalogo()" onfocus="if(this.options.length<=1)filtrarEspecialidadesCatalogo()" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:12px;font-size:16px;margin-bottom:10px;box-sizing:border-box;-webkit-appearance:auto">'
    +'<option value="">Selecione a categoria primeiro...</option>'
    +'</select>';

  ov.innerHTML='<div style="background:#141414;border:1px solid #FFC400;border-radius:14px;padding:20px;max-width:400px;margin:0 auto">'
    +'<div style="font-size:15px;font-weight:800;color:#FFC400;margin-bottom:16px">⭐ Nova Especialidade</div>'
    +(cats.length?'<div style="font-size:12px;color:#aaa;margin-bottom:4px">Categoria <span style="color:#e55">*</span></div>'+catSel:'')
    +'<div style="font-size:12px;color:#aaa;margin-bottom:4px">Nome da especialidade <span style="color:#e55">*</span></div>'
    +(cats.length?nomeSel:'<input id="_espNome_" placeholder="Nome" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:12px;font-size:16px;margin-bottom:10px;box-sizing:border-box">')
    +'<div style="font-size:12px;color:#aaa;margin-bottom:6px">Escopo</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:14px">'
    +'<button id="_esc1_" onclick="selEscopoEsp(\'classe\')" class="pill on" style="white-space:nowrap;font-size:13px">Por Classe</button>'
    +'<button id="_esc2_" onclick="selEscopoEsp(\'unidade\')" class="pill" style="white-space:nowrap;font-size:13px">Por Unidade</button>'
    +'<button id="_esc3_" onclick="selEscopoEsp(\'individual\')" class="pill" style="white-space:nowrap;font-size:13px">Individual</button>'
    +'</div>'
    +'<div id="_escopoDiv_" style="margin-bottom:12px">'
    +'<div style="font-size:12px;color:#aaa;margin-bottom:4px">Classe</div>'
    +'<select id="_espEscVal_" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:12px;font-size:16px;box-sizing:border-box;-webkit-appearance:auto">'
    +['Amigo','Companheiro','Pesquisador','Pioneiro','Excursionista','Guia','Líder','Líder Master','Líder Master Avançado'].map(function(c){return'<option value="'+c+'">'+c+'</option>';}).join('')
    +'</select></div>'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">'
    +'<input type="checkbox" id="_espOpc_" style="width:18px;height:18px;cursor:pointer">'
    +'<label for="_espOpc_" style="font-size:14px;color:#aaa;cursor:pointer">Opcional (não conta na % de conclusão)</label>'
    +'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button onclick="document.getElementById(\'_addEspOv_\').remove()" style="flex:1;background:#1c1c1c;color:#aaa;border:1px solid #333;border-radius:10px;padding:12px;font-weight:700;cursor:pointer">Cancelar</button>'
    +'<button onclick="confirmarAddEsp()" style="flex:1;background:#FFC400;color:#000;border:none;border-radius:10px;padding:12px;font-weight:800;cursor:pointer">Adicionar ✓</button>'
    +'</div></div>';
  document.body.appendChild(ov);

  // Adicionar listeners explícitos (mais confiável que atributos onchange no iOS)

}

function filtrarEspecialidadesCatalogo(){
  var sel=document.getElementById('_espCatSel_');
  var nomeSel=document.getElementById('_espNome_');
  if(!sel||!nomeSel)return;
  var cat=(sel.value||'').trim().replace(/\s+/g,' ');
  var catalog=window._espCatalogo||{};
  var esps=catalog[cat];
  if(!esps && cat){
    var catLow=cat.toLowerCase();
    Object.keys(catalog).forEach(function(k){
      if(k.trim().replace(/\s+/g,' ').toLowerCase()===catLow)esps=catalog[k];
    });
  }
  if(!esps && cat && sel.selectedIndex>0){
    var visText=(sel.options[sel.selectedIndex].text||'').trim().replace(/\s+/g,' ');
    var visLow=visText.toLowerCase();
    Object.keys(catalog).forEach(function(k){
      if(!esps && k.trim().replace(/\s+/g,' ').toLowerCase()===visLow)esps=catalog[k];
    });
  }
  esps=esps||[];
  // ── Substituir elemento inteiro em vez de atualizar innerHTML ──
  // iOS cacheia o select vazio; um elemento novo força releitura
  var novoSel=document.createElement('select');
  novoSel.id='_espNome_';
  novoSel.style.cssText=nomeSel.style.cssText;
  var placeholder=document.createElement('option');
  placeholder.value='';
  placeholder.textContent=cat?'Selecione a especialidade...':'Selecione a categoria primeiro...';
  novoSel.appendChild(placeholder);
  esps.forEach(function(e){
    var nome=typeof e==='object'?e.nome:e;
    var opt=document.createElement('option');
    opt.value=nome;
    opt.textContent=nome;
    novoSel.appendChild(opt);
  });
  nomeSel.parentNode.replaceChild(novoSel,nomeSel);
}

function selEscopoEsp(tipo){
  ['_esc1_','_esc2_','_esc3_'].forEach(function(id,i){
    var el=document.getElementById(id);if(el)el.className='pill'+([tipo==='classe',tipo==='unidade',tipo==='individual'][i]?' on':'');
  });
  var div=document.getElementById('_escopoDiv_');if(!div)return;
  if(tipo==='classe')div.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:4px">Classe</div><select id="_espEscVal_" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;box-sizing:border-box">'+window._espCOpts+'</select>';
  else if(tipo==='unidade')div.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:4px">Unidade</div><select id="_espEscVal_" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;box-sizing:border-box">'+window._espUOpts+'</select>';
  else div.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:4px">Nome do membro</div><input id="_espEscVal_" placeholder="Nome exato do membro" style="width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;padding:9px;font-size:14px;box-sizing:border-box">';
}

function confirmarAddEsp(){
  var nomeEl=$('_espNome_');
  var nome=(nomeEl?nomeEl.value:'').trim();
  if(!nome){alert('Selecione ou informe a especialidade.');return;}
  var escVal=($('_espEscVal_')||{value:''}).value.trim();
  if(!escVal){alert('Selecione o escopo.');return;}
  var catEl=$('_espCatSel_');
  var cat=(catEl?catEl.value:'').trim();
  if(!cat){alert('Selecione a categoria.');return;}
  var opcional=!!(($('_espOpc_')||{}).checked);
  var cor='';
  // Buscar cor da especialidade no catálogo
  if(window._espCatalogo&&window._espCatalogo[cat]){
    var found=(window._espCatalogo[cat]||[]).find(function(e){
      return (typeof e==='object'?e.nome:e)===nome;
    });
    if(found&&typeof found==='object')cor=found.cor||'';
  }
  var ov=document.getElementById('_addEspOv_');if(ov)ov.remove();
  callAPI('addEspecialidade',{dados:{nome:nome,escopo:escVal,categoria:cat,descricao:'',opcional:opcional,cor:cor}},
    function(){mostrarToast('✓ Especialidade adicionada!');loadEspecialidadesTab();},
    function(e){alert('Erro: '+(e.message||e));}
  );
}

function deleteEspItem(key, espNome){
  if(!confirm('Tem certeza que quer excluir "'+espNome+'" desta especialidade? Essa ação não pode ser desfeita.'))return;
  callAPI('deleteEspecialidade',{key:key, espNome:espNome},function(r){
    mostrarToast('Especialidade removida.');
    loadEspecialidadesTab();
  },function(e){
    mostrarToast('Erro ao excluir: '+(e.message||e));
  });
}

function selecionarCatEsp(cat){
  // Atualizar input hidden
  var inp=document.getElementById('_espCatSel_');
  if(inp)inp.value=cat;
  // Visual: desmarcar todos os pills, marcar o selecionado
  var pills=document.querySelectorAll('[id^="_cp"]');
  pills.forEach(function(p){
    var active=p.dataset.cat===cat;
    p.style.background=active?'#FFC400':'#1c1c1c';
    p.style.color=active?'#000':'#aaa';
    p.style.borderColor=active?'#FFC400':'#333';
  });
  // Filtrar especialidades
  filtrarEspecialidadesCatalogo();
}
